name = "aiovtue-blog"   # 项目名，可以改
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"   # 这个不能动
database_name = "aiovtue-blog"   # 名字不一样也要改，最好一样
database_id = "143733cf-1828-4d43-b9c9-f386fd2653db"  # 数据库id改成自己的

[[r2_buckets]]
binding = "BUCKET"   # 这个不能动
bucket_name = "aiovtue-blog"   # 名字不一样也要改，最好一样

[vars]
SITE_URL = "https://live.yybb.us"
